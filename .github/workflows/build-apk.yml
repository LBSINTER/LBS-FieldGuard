name: Android APK Release

on:
  push:
    tags:
      - 'v*'
  # Allow manual trigger to re-build for an existing tag
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java ─────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci --prefer-offline

      # ── Keystore ─────────────────────────────────────────────────────────────
      # Option A: release keystore from GitHub encrypted secrets
      # Set these repository secrets to enable signed release builds:
      #   FIELDGUARD_KEYSTORE_BASE64  — base-64 encoded .jks file
      #   FIELDGUARD_KEY_ALIAS        — key alias
      #   FIELDGUARD_STORE_PASSWORD   — keystore password
      #   FIELDGUARD_KEY_PASSWORD     — key password
      #
      # Option B: if secrets are absent, a fresh debug keystore is generated and
      #           used for signing (APK is still fully installable).

      - name: Decode release keystore (if secrets present)
        if: ${{ secrets.FIELDGUARD_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.FIELDGUARD_KEYSTORE_BASE64 }}" \
            | base64 --decode > android/app/fieldguard-release.keystore

      - name: Generate debug keystore (fallback when no secrets)
        if: ${{ secrets.FIELDGUARD_KEYSTORE_BASE64 == '' }}
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=LBS FieldGuard, OU=LBS, O=LBS INT, L=Unknown, S=Unknown, C=US" \
            2>/dev/null || true

      # ── Gradle properties for release signing ─────────────────────────────────
      - name: Write signing properties
        if: ${{ secrets.FIELDGUARD_KEYSTORE_BASE64 != '' }}
        run: |
          cat >> android/gradle.properties << EOF
          FIELDGUARD_UPLOAD_STORE_FILE=fieldguard-release.keystore
          FIELDGUARD_UPLOAD_KEY_ALIAS=${{ secrets.FIELDGUARD_KEY_ALIAS }}
          FIELDGUARD_UPLOAD_STORE_PASSWORD=${{ secrets.FIELDGUARD_STORE_PASSWORD }}
          FIELDGUARD_UPLOAD_KEY_PASSWORD=${{ secrets.FIELDGUARD_KEY_PASSWORD }}
          EOF

      # ── Make gradlew executable ───────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Gradle cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Bundle JS ─────────────────────────────────────────────────────────────
      - name: Bundle JS (Metro)
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      # ── Build APK ────────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Rename APK with version tag ───────────────────────────────────────────
      - name: Rename APK
        id: rename_apk
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "$TAG" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          APK_NAME="LBS-FieldGuard-${TAG:-dev}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "${APK_NAME}"
          echo "apk_path=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      # ── Upload APK artifact (always, for download from Actions tab) ───────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename_apk.outputs.apk_name }}
          path: ${{ steps.rename_apk.outputs.apk_path }}
          retention-days: 30

      # ── Create / update GitHub Release and attach APK ─────────────────────────
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rename_apk.outputs.tag }}
          name: "LBS FieldGuard ${{ steps.rename_apk.outputs.tag }}"
          body: |
            ## LBS FieldGuard ${{ steps.rename_apk.outputs.tag }}

            ### Android APK

            Download `${{ steps.rename_apk.outputs.apk_name }}` below and install directly:

            ```
            adb install ${{ steps.rename_apk.outputs.apk_name }}
            ```

            **Required Android permissions:**
            - `RECEIVE_SMS` / `READ_SMS` — RIL monitor
            - `READ_PHONE_STATE` — IMSI/cell info
            - `BIND_VPN_SERVICE` — packet capture
            - `MANAGE_EXTERNAL_STORAGE` — file scanner

            **Minimum:** Android 8.0 (API 26)

            ---
            *Built by GitHub Actions — commit ${{ github.sha }}*
          files: ${{ steps.rename_apk.outputs.apk_path }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
