apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

react {
    /* JavaScript entry file */
    entryFile = file("../../index.js")
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.lbs.fieldguard"

    defaultConfig {
        applicationId "com.lbs.fieldguard"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.0.3"
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (project.hasProperty("FIELDGUARD_UPLOAD_STORE_FILE")) {
                storeFile file(FIELDGUARD_UPLOAD_STORE_FILE)
                storePassword FIELDGUARD_UPLOAD_STORE_PASSWORD
                keyAlias FIELDGUARD_UPLOAD_KEY_ALIAS
                keyPassword FIELDGUARD_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Fall back to debug signing if release keystore not configured
            signingConfig project.hasProperty("FIELDGUARD_UPLOAD_STORE_FILE")
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // AndroidX
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core-ktx:1.12.0"
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")

def nativeModulesScript = file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
if (nativeModulesScript.exists()) {
    apply from: nativeModulesScript
    applyNativeModulesAppBuildGradle(project)
}
