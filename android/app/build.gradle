apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

react {
    entryFile = file("../../index.js")
    hermesEnabled = true
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.lbs.fieldguard"

    defaultConfig {
        applicationId "com.lbs.fieldguard"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.0.3"
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (project.hasProperty("FIELDGUARD_UPLOAD_STORE_FILE")) {
                storeFile file(FIELDGUARD_UPLOAD_STORE_FILE)
                storePassword FIELDGUARD_UPLOAD_STORE_PASSWORD
                keyAlias FIELDGUARD_UPLOAD_KEY_ALIAS
                keyPassword FIELDGUARD_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig project.hasProperty("FIELDGUARD_UPLOAD_STORE_FILE")
                ? signingConfigs.release
                : signingConfigs.debug
            // DISABLED R8/ProGuard — native modules get stripped via reflection
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core-ktx:1.12.0"
}

// Vector icons font copy
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

// React Native native modules (autolink) — apply ONCE only
apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
